<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>
  <!-- HUGE Paintbrush (violet gradient) — upper-left, dominant -->
  <rect x="50" y="20" width="220" height="160" rx="28" fill="url(#grad)"/>
  <!-- Bristles -->
  <rect x="80" y="180" width="36" height="50" rx="8" fill="url(#grad)"/>
  <rect x="142" y="180" width="36" height="50" rx="8" fill="url(#grad)"/>
  <rect x="204" y="180" width="36" height="50" rx="8" fill="url(#grad)"/>
  <!-- Handle -->
  <rect x="110" y="230" width="100" height="280" rx="18" fill="url(#grad)"/>
  <!-- Robot (lime green, bottom-right, smaller) -->
  <rect x="280" y="330" width="190" height="120" rx="32" fill="none" stroke="#84cc16" stroke-width="24"/>
  <circle cx="345" cy="390" r="14" fill="#84cc16"/>
  <circle cx="415" cy="390" r="14" fill="#84cc16"/>
  <rect x="367" y="278" width="16" height="55" rx="8" fill="#84cc16"/>
  <circle cx="375" cy="262" r="26" fill="#84cc16"/>
  <circle cx="375" cy="262" r="12" fill="#000000"/>
</svg>
