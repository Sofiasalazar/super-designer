  <rect x="70" y="210" width="265" height="162" rx="38" fill="none" stroke="#FFFFFF" stroke-width="30"/>
  <!-- Robot eyes -->
  <circle cx="163" cy="291" r="17" fill="#FFFFFF"/>
  <circle cx="250" cy="291" r="17" fill="#FFFFFF"/>
  <!-- Antenna stem -->
