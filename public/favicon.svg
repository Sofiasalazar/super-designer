  <circle cx="204" cy="132" r="35" fill="#FFFFFF"/>
  <circle cx="204" cy="132" r="16" fill="#000000"/>
  <!-- Paintbrush (violet) — upper-right, overlapping robot -->
  <!-- Brush head (wide rounded rect) -->
  <rect x="345" y="108" width="80" height="56" rx="12" fill="#8b5cf6"/>
  <!-- Brush bristles (3 small rects at bottom of head) -->
  <rect x="355" y="164" width="12" height="18" rx="3" fill="#8b5cf6"/>
  <rect x="379" y="164" width="12" height="18" rx="3" fill="#8b5cf6"/>
